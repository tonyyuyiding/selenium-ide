# Build and attach platform binaries to a GitHub Release.
# Triggered automatically when release-please pushes a v* tag,
# or manually via the Actions tab.

name: 'Release Selenium IDE'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Release IDE to GitHub for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: mac

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install
      - name: Install app dependencies
        run: pnpm run --filter selenium-ide install-app-deps
      - name: Build all JS
        run: pnpm run build
        env:
          NODE_ENV: "production"
      - name: Build selenium-ide binaries
        run: pnpm run --filter selenium-ide publish:electron:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
